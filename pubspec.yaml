name: quki_notes
description: "QuKi-Notes — capture and toss ephemeral notes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  uuid: ^4.5.3
  # super_editor and super_clipboard deferred to Phase 1 — their transitive dep
  # irondash_engine_context bundles a CargoKit Gradle plugin that uses exec(),
  # which was removed in Gradle 9. Add them back at Phase 1 kickoff.
  shared_preferences: ^2.5.5
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4-dev.1
  drift_dev: ^2.33.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
